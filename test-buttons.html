<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Boutons - CAPSLOCK</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #f7fafd; 
      margin: 0; 
      padding: 20px; 
    }
    
    .test-container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    
    .auth-buttons {
      display: flex;
      gap: 12px;
      margin: 20px 0;
    }

    .auth-button {
      background: transparent;
      color: #1a7ee7;
      border: 2px solid #1a7ee7;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .auth-button:hover {
      background: #1a7ee7;
      color: white;
    }

    .auth-button.primary {
      background: #1a7ee7;
      color: white;
    }

    .auth-button.primary:hover {
      background: #1766b8;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
    }

    .modal-content {
      background-color: white;
      margin: 10% auto;
      padding: 30px;
      border-radius: 16px;
      width: 90%;
      max-width: 400px;
      position: relative;
    }

    .close {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      position: absolute;
      right: 20px;
      top: 15px;
    }

    .close:hover {
      color: #1a7ee7;
    }

    .status {
      margin-top: 20px;
      padding: 10px;
      border-radius: 5px;
      background: #e8f5e8;
      color: #2d5a2d;
    }
  </style>
</head>
<body>
  <div class="test-container">
    <h1>🧪 Test des Boutons d'Authentification</h1>
    
    <div class="auth-buttons">
      <button class="auth-button" onclick="showLoginModal()">Se connecter</button>
      <button class="auth-button primary" onclick="showRegisterModal()">Créer un compte</button>
    </div>
    
    <div class="status" id="status">
      Cliquez sur un bouton pour tester...
    </div>
  </div>

  <!-- Modal de connexion -->
  <div id="loginModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeLoginModal()">&times;</span>
      <h2>Connexion</h2>
      <p>Modal de connexion ouverte avec succès !</p>
      <button onclick="closeLoginModal()">Fermer</button>
    </div>
  </div>

  <!-- Modal d'inscription -->
  <div id="registerModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeRegisterModal()">&times;</span>
      <h2>Créer un compte</h2>
      <p>Modal d'inscription ouverte avec succès !</p>
      <button onclick="closeRegisterModal()">Fermer</button>
    </div>
  </div>

  <script>
    // Définir les fonctions globalement
    window.showLoginModal = function() {
      console.log('showLoginModal appelé');
      document.getElementById('loginModal').style.display = 'block';
      document.getElementById('registerModal').style.display = 'none';
      document.getElementById('status').textContent = '✅ Modal de connexion ouverte !';
      document.getElementById('status').style.background = '#e8f5e8';
      document.getElementById('status').style.color = '#2d5a2d';
    };

    window.showRegisterModal = function() {
      console.log('showRegisterModal appelé');
      document.getElementById('registerModal').style.display = 'block';
      document.getElementById('loginModal').style.display = 'none';
      document.getElementById('status').textContent = '✅ Modal d\'inscription ouverte !';
      document.getElementById('status').style.background = '#e8f5e8';
      document.getElementById('status').style.color = '#2d5a2d';
    };

    window.closeLoginModal = function() {
      document.getElementById('loginModal').style.display = 'none';
      document.getElementById('status').textContent = 'Modal de connexion fermée';
    };

    window.closeRegisterModal = function() {
      document.getElementById('registerModal').style.display = 'none';
      document.getElementById('status').textContent = 'Modal d\'inscription fermée';
    };

    // Fermer les modales en cliquant à l'extérieur
    window.onclick = function(event) {
      const loginModal = document.getElementById('loginModal');
      const registerModal = document.getElementById('registerModal');
      
      if (event.target === loginModal) {
        closeLoginModal();
      }
      if (event.target === registerModal) {
        closeRegisterModal();
      }
    }

    console.log('Script de test chargé avec succès');
  </script>
</body>
</html>
