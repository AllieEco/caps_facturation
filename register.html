<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription - CAPS FACT</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><style>.cls-1{fill:%23f4d03f;}.cls-2{fill:%23333;stroke:%23333;stroke-width:2;fill:none;}.cls-3{fill:%23333;}</style></defs><polygon class='cls-1' points='45,10 50,20 60,20 52,28 55,38 45,33 35,38 38,28 30,20 40,20'/><polygon class='cls-1' points='70,25 73,30 78,30 75,33 76,38 70,35 64,38 65,33 62,30 67,30'/><polygon class='cls-1' points='58,45 61,50 66,50 63,53 64,58 58,55 52,58 53,53 50,50 55,50'/><rect class='cls-2' x='15' y='25' width='45' height='60' rx='3'/><rect class='cls-3' x='20' y='35' width='25' height='2'/><rect class='cls-3' x='20' y='45' width='20' height='2'/><rect class='cls-3' x='20' y='55' width='25' height='2'/><rect class='cls-3' x='20' y='65' width='15' height='2'/><circle class='cls-2' cx='70' cy='60' r='15'/><text x='70' y='67' text-anchor='middle' class='cls-3' font-family='Arial' font-size='16' font-weight='bold'>$</text><path class='cls-2' d='M15,80 Q15,85 20,85 L75,85 Q80,85 80,80 L80,75 L15,75 Z'/></svg>" type="image/svg+xml">
  <style>
    body {
      font-family: 'Montserrat', Arial, sans-serif;
      background: linear-gradient(135deg, #1a7ee7, #0f5bb8);
      margin: 0;
      padding: 20px 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .register-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
      padding: 40px;
      width: 100%;
      max-width: 500px;
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #f4d03f, #f39c12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: white;
      font-weight: bold;
    }

    .title {
      color: #1a7ee7;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #666;
      font-size: 1rem;
      margin-bottom: 30px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e1e8ed;
      border-radius: 10px;
      font-size: 1rem;
      font-family: 'Montserrat', Arial, sans-serif;
      transition: border-color 0.3s ease;
      box-sizing: border-box;
    }

    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: #1a7ee7;
    }

    .register-btn {
      width: 100%;
      background: linear-gradient(135deg, #1a7ee7, #0f5bb8);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      font-family: 'Montserrat', Arial, sans-serif;
      margin-top: 10px;
    }

    .register-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(26,126,231,0.3);
    }

    .register-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .login-link {
      margin-top: 20px;
      color: #666;
      font-size: 0.9rem;
    }

    .login-link a {
      color: #1a7ee7;
      text-decoration: none;
      font-weight: 600;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .error-message {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }

    .success-message {
      background: #efe;
      color: #3c3;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .config-section {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 20px;
      margin: 20px 0;
      text-align: left;
    }

    .config-section h3 {
      color: #1a7ee7;
      margin-bottom: 15px;
      font-size: 1.1rem;
    }

    @media (max-width: 600px) {
      .form-row {
        grid-template-columns: 1fr;
      }
      
      .register-container {
        margin: 10px;
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="register-container">
    <div class="logo">CF</div>
    <h1 class="title">CAPS FACT</h1>
    <p class="subtitle">Créez votre compte comptable</p>
    
    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>
    
    <form id="registerForm">
      <div class="form-row">
        <div class="form-group">
          <label for="nom">Nom complet</label>
          <input type="text" id="nom" name="nom" required>
        </div>
        <div class="form-group">
          <label for="entreprise">Nom de l'entreprise</label>
          <input type="text" id="entreprise" name="entreprise" required>
        </div>
      </div>
      
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" name="password" required minlength="6">
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirmer le mot de passe</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required>
        </div>
      </div>

      <div class="config-section">
        <h3>Configuration de votre entreprise</h3>
        
        <div class="form-group">
          <label for="statutJuridique">Statut juridique</label>
          <select id="statutJuridique" name="statutJuridique" required>
            <option value="micro">Micro-entreprise</option>
            <option value="sasu">SASU</option>
            <option value="eurl">EURL</option>
            <option value="sarl">SARL</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="emetteurNom">Nom de l'émetteur</label>
            <input type="text" id="emetteurNom" name="emetteurNom" placeholder="cAPSLOCK">
          </div>
          <div class="form-group">
            <label for="emetteurContact">Contact</label>
            <input type="text" id="emetteurContact" name="emetteurContact" placeholder="BON Allison">
          </div>
        </div>

        <div class="form-group">
          <label for="emetteurAdresse">Adresse</label>
          <input type="text" id="emetteurAdresse" name="emetteurAdresse" placeholder="3 rue Flachet">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="emetteurCodePostal">Code postal</label>
            <input type="text" id="emetteurCodePostal" name="emetteurCodePostal" placeholder="69100">
          </div>
          <div class="form-group">
            <label for="emetteurVille">Ville</label>
            <input type="text" id="emetteurVille" name="emetteurVille" placeholder="VILLEURBANNE">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="emetteurSiret">SIRET</label>
            <input type="text" id="emetteurSiret" name="emetteurSiret" placeholder="98895410300012">
          </div>
          <div class="form-group">
            <label for="emetteurEmail">Email</label>
            <input type="email" id="emetteurEmail" name="emetteurEmail" placeholder="a.capslock@proton.me">
          </div>
        </div>

        <div class="form-group">
          <label for="emetteurTel">Téléphone</label>
          <input type="tel" id="emetteurTel" name="emetteurTel" placeholder="07 67 89 08 96">
        </div>
      </div>
      
      <button type="submit" class="register-btn" id="registerBtn">
        <span id="registerText">Créer mon compte</span>
        <span id="registerSpinner" class="loading" style="display: none;"></span>
      </button>
    </form>
    
    <div class="login-link">
      Déjà un compte ? <a href="login.html">Se connecter</a>
    </div>
  </div>

  <script src="assets/js/api-service.js"></script>
  <script>
    // Vérifier si l'utilisateur est déjà connecté
    if (apiService.isAuthenticated()) {
      window.location.href = '/';
    }

    const registerForm = document.getElementById('registerForm');
    const registerBtn = document.getElementById('registerBtn');
    const registerText = document.getElementById('registerText');
    const registerSpinner = document.getElementById('registerSpinner');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.style.display = 'block';
      successMessage.style.display = 'none';
    }

    function showSuccess(message) {
      successMessage.textContent = message;
      successMessage.style.display = 'block';
      errorMessage.style.display = 'none';
    }

    function setLoading(loading) {
      if (loading) {
        registerBtn.disabled = true;
        registerText.style.display = 'none';
        registerSpinner.style.display = 'inline-block';
      } else {
        registerBtn.disabled = false;
        registerText.style.display = 'inline';
        registerSpinner.style.display = 'none';
      }
    }

    function validateForm() {
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const email = document.getElementById('email').value;
      const nom = document.getElementById('nom').value;
      const entreprise = document.getElementById('entreprise').value;

      if (!email || !password || !nom || !entreprise) {
        showError('Veuillez remplir tous les champs obligatoires');
        return false;
      }

      if (password !== confirmPassword) {
        showError('Les mots de passe ne correspondent pas');
        return false;
      }

      if (password.length < 6) {
        showError('Le mot de passe doit contenir au moins 6 caractères');
        return false;
      }

      return true;
    }

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      if (!validateForm()) {
        return;
      }

      setLoading(true);
      errorMessage.style.display = 'none';

      try {
        // Récupération des données du formulaire
        const formData = new FormData(registerForm);
        const userData = {
          email: formData.get('email'),
          password: formData.get('password'),
          nom: formData.get('nom'),
          entreprise: formData.get('entreprise'),
          config: {
            statutJuridique: formData.get('statutJuridique'),
            emetteurNom: formData.get('emetteurNom') || 'cAPSLOCK',
            emetteurContact: formData.get('emetteurContact') || 'BON Allison',
            emetteurAdresse: formData.get('emetteurAdresse') || '3 rue Flachet',
            emetteurCodePostal: formData.get('emetteurCodePostal') || '69100',
            emetteurVille: formData.get('emetteurVille') || 'VILLEURBANNE',
            emetteurSiret: formData.get('emetteurSiret') || '98895410300012',
            emetteurEmail: formData.get('emetteurEmail') || 'a.capslock@proton.me',
            emetteurTel: formData.get('emetteurTel') || '07 67 89 08 96'
          }
        };

        const response = await apiService.register(userData);
        showSuccess('Compte créé avec succès ! Redirection...');
        
        // Redirection après 2 secondes
        setTimeout(() => {
          window.location.href = '/';
        }, 2000);

      } catch (error) {
        console.error('Erreur d\'inscription:', error);
        
        if (error.status === 400) {
          showError('Un utilisateur avec cet email existe déjà');
        } else if (error.status === 0) {
          showError('Impossible de se connecter au serveur. Vérifiez que le serveur MongoDB est démarré.');
        } else {
          showError('Erreur lors de la création du compte. Veuillez réessayer.');
        }
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
